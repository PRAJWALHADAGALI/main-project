<!-- For testing -->

<section class="my-body">
  <div class="">
    <div class="card" *ngIf="count && !previewFlag">
      <div class="row g-0 " *ngFor="let item of cartService.cartItems">
        <div class="col col-xs-2 image">
          <img src="{{item.image}}" class="img-fluid rounded-start" alt="...">
        </div>
        <div class="col col-xs-10">
          <div class="card-body">
            <h6 class="card-title">{{item.name}}</h6>
            <div class="pricing">
              <div class="price">
                <p class="card-text">Price:{{item.price | currency: 'USD': true}}</p>
              </div>
              <div class="Quantity">
                <label>Quantity:</label>
                <input type="number" name="" value="" max="1" min="1" [(ngModel)]="item.qty" (click)="chngQuantity()">
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div *ngIf="previewFlag" class="row">
      <div class="col"> no items in the cart</div>
    </div>

    <div class="card" *ngIf="count && !previewFlag">
      <div class="row g-0 " *ngFor="let item of cartService.cartItems">
        <div class="col col-xs-2 image">
          <img src="{{item.image}}" class="img-fluid" alt="...">
        </div>
        <div class="col col-xs-10">
          <div class="card-body">
            <h6 class="card-title">{{item.name}}</h6>
            <div class="pricing">
              <div class="price">
                <p class="card-text">Price:{{item.price | currency: 'USD': true}}</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="previewFlag">
      <div class="row mb-3" *ngFor="let item of cartService.cartItems">
        <div class="col-md-4"> {{item.name}} </div>
        <div class="col-md-3 ml-md-auto"> {{item.price | currency: 'USD': true}} </div>
      </div>
    </div>
  </div>

  <button *ngIf="!previewFlag" type="button" class="btn btn-success"  [routerLink]="['/address']">CheckOut</button>
</section>
