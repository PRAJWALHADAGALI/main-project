<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <title></title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/0d702c4e49.js" crossorigin="anonymous"></script>
</head>

<body>
  <section id="my-body">
    <app-header></app-header>

    <section class="symbol-cont">
      <div class="for-buttons">
        <div class="row">
          <div class="col col-lg-6 col-md-6 col-sm-6 symbol-class">
            <fa-icon class="fa-store" [icon]="faStore"></fa-icon>
            <h3>Store Access</h3>
          </div>
          <div [routerLink]="['/productsCategories']" class="col col-lg-6 col-md-6 col-sm-6 symbol-class">
            <fa-icon  class="fa-store-left" [icon]="faBagShopping"></fa-icon>

            <h3>Find My Products</h3>
          </div>
        </div>
        <div class="row">
          <div [routerLink]="['/cart']" class="col col-lg-6 col-md-6 col-sm-6 symbol-class">
            <fa-icon class="fa-store" [icon]="faCartShopping"></fa-icon>

            <h3>My Cart</h3>
          </div>
          <div class="col col-lg-6 col-md-6 col-sm-6 symbol-class">
            <fa-icon class="fa-store-left" [icon]="faUser"></fa-icon>

            <h3>My Orders</h3>
          </div>
        </div>
      </div>
    </section>
  </section>
  <app-footer></app-footer>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js" integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+" crossorigin="anonymous"></script>
</body>

</html>
